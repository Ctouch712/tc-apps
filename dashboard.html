<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Dashboard — Top Coat Fabrication</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--bg2:#eceae4;--surface:#fff;
  --border:#d4d1c7;--border2:#bfbcb0;
  --text:#1a1916;--text2:#6b6860;--text3:#a09d94;
  --red:#c0392b;--red-bg:#fdf0ee;--red-b:#f0c4bd;
  --amber:#b45309;--amber-bg:#fef9ee;--amber-b:#f0d8a0;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-b:#bfdbfe;
  --green:#166534;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --gray:#374151;--gray-bg:#f9fafb;--gray-b:#e5e7eb;
  --sans:system-ui,sans-serif;--mono:'Courier New',monospace;
  --r:8px;--r-sm:5px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px 40px;text-align:center;max-width:380px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6;}
.btn-login{background:#1a1916;color:#fff;border:none;border-radius:var(--r-sm);padding:11px 28px;font-size:14px;cursor:pointer;width:100%;}
.btn-login:hover{opacity:.85;}
#app-screen{display:none;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.logo{height:40px;width:40px;object-fit:contain;border-radius:50%;}
.topbar-title{font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.user-badge{font-size:12px;color:var(--text2);}
.btn-sm{font-family:var(--sans);font-size:12px;padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;}
.btn-sm:hover{border-color:var(--border2);color:var(--text);}
.btn-primary{background:#1a1916;color:#fff;border-color:#1a1916;}
.btn-primary:hover{opacity:.85;color:#fff;}
.status-bar{padding:8px 24px;font-size:12px;font-family:var(--mono);display:none;}
.status-bar.loading{display:block;background:var(--amber-bg);color:var(--amber);border-bottom:1px solid var(--amber-b);}
.status-bar.ok{display:block;background:var(--green-bg);color:var(--green);border-bottom:1px solid var(--green-b);}
.status-bar.err{display:block;background:var(--red-bg);color:var(--red);border-bottom:1px solid var(--red-b);}
.stats{display:flex;gap:12px;padding:20px 24px;border-bottom:1px solid var(--border);overflow-x:auto;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;min-width:110px;flex-shrink:0;}
.stat .num{font-size:26px;font-weight:600;font-family:var(--mono);}
.stat .lbl{font-size:11px;color:var(--text3);margin-top:2px;}
.stat.open .num{color:var(--blue);}
.stat.progress .num{color:var(--amber);}
.stat.closed .num{color:var(--green);}
.stat.critical .num{color:var(--red);}
.toolbar{display:flex;gap:10px;padding:16px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.toolbar input,.toolbar select{font-family:var(--sans);font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);color:var(--text);outline:none;}
.toolbar input{min-width:220px;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--border2);}
.table-wrap{overflow-x:auto;padding:0 24px 40px;}
table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:11px;font-family:var(--mono);letter-spacing:.05em;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap;text-transform:uppercase;}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--bg2);cursor:pointer;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-family:var(--mono);white-space:nowrap;}
.p-critical{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);}
.p-high{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);}
.p-medium{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b);}
.p-low{background:var(--gray-bg);color:var(--gray);border:1px solid var(--gray-b);}
.s-open{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b);}
.s-inprogress{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);}
.s-closed{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);}
.empty{text-align:center;padding:60px;color:var(--text3);font-size:14px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:600px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal h2{font-size:16px;font-weight:600;margin-bottom:20px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;}
.field input,.field select,.field textarea{font-family:var(--sans);font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);outline:none;}
.field textarea{min-height:80px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--border2);}
.activity-log{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;font-size:12px;font-family:var(--mono);color:var(--text2);max-height:140px;overflow-y:auto;line-height:1.8;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.btn-cancel{font-family:var(--sans);font-size:13px;padding:8px 18px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;}
.btn-save{font-family:var(--sans);font-size:13px;padding:8px 18px;border-radius:var(--r-sm);border:none;background:#1a1916;color:#fff;cursor:pointer;}
.btn-save:hover{opacity:.85;}
</style>
</head>

const FOLDER_PATH = 'Leadership Team/IT/IT Tickets';
const FILE_NAME = 'it_tickets_data.json';

let msalInstance, token, tickets=[], ticketCounter=0, editingId=null, _driveId=null;

async function getDriveId() {
  if (_driveId) return _driveId;
  const res = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${SITE_HOSTNAME}:${SITE_PATH}:/drives`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error(`Could not get drives: HTTP ${res.status}`);
  const data = await res.json();
  const docLib = data.value.find(d=>d.driveType==='documentLibrary') || data.value[0];
  if (!docLib) throw new Error('No document library found');
  _driveId = docLib.id;
  console.log('Drive ID:', _driveId);
  return _driveId;
}

async function getFileUrl() {
  const id = await getDriveId();
  return `https://graph.microsoft.com/v1.0/drives/${id}/root:/${FOLDER_PATH}/${FILE_NAME}:/content`;
}

async function ensureFolder() {
  const id = await getDriveId();
  const parts = FOLDER_PATH.split('/');
  let currentPath = '';
  for (const part of parts) {
    currentPath = currentPath ? `${currentPath}/${part}` : part;
    const res = await fetch(`https://graph.microsoft.com/v1.0/drives/${id}/root:/${currentPath}`, { headers: { Authorization:`Bearer ${token}` } });
    if (res.status===404) {
      const parentPath = currentPath.includes('/') ? currentPath.substring(0,currentPath.lastIndexOf('/')) : '';
      const createUrl = parentPath
        ? `https://graph.microsoft.com/v1.0/drives/${id}/root:/${parentPath}:/children`
        : `https://graph.microsoft.com/v1.0/drives/${id}/root/children`;
      await fetch(createUrl,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({name:part,folder:{},"@microsoft.graph.conflictBehavior":"rename"})});
    }
  }
}

async function loadTickets() {
  const url = await getFileUrl();
  console.log('Loading from:', url);
  const res = await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  console.log('Response status:', res.status);
  if(res.status===404){tickets=[];ticketCounter=0;return;}
  if(!res.ok){const t=await res.text();throw new Error(`HTTP ${res.status}: ${t}`);}
  const data=await res.json();
  tickets=Array.isArray(data)?data:(data.tickets||[]);
  ticketCounter=Array.isArray(data)?tickets.length:(data.ticketCounter||tickets.length);
  console.log('Loaded tickets:', tickets.length);
}

async function saveTickets() {
  await ensureFolder();
  const url=await getFileUrl();
  const res=await fetch(url,{method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({tickets,ticketCounter},null,2)});
  if(!res.ok){const t=await res.text();throw new Error(`Save failed ${res.status}: ${t}`);}
}

async function initAuth() {
  msalInstance=new msal.PublicClientApplication({auth:{clientId:CLIENT_ID,authority:`https://login.microsoftonline.com/${TENANT_ID}`,redirectUri:window.location.href.split('?')[0].split('#')[0]},cache:{cacheLocation:'sessionStorage'}});
  await msalInstance.initialize();
  const result=await msalInstance.handleRedirectPromise();
  if(result){token=result.accessToken;showApp(result.account);return;}
  const accounts=msalInstance.getAllAccounts();
  if(accounts.length){try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:accounts[0]});token=r.accessToken;showApp(accounts[0]);}catch(e){showLogin();}}
  else showLogin();
}

function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app-screen').style.display='none';}
async function login(){await msalInstance.loginRedirect({scopes:SCOPES});}
async function logout(){await msalInstance.logoutRedirect();}

function showApp(account){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-name').textContent=account.name||account.username;
  loadAndRender();
}

async function loadAndRender(){
  setStatus('loading','Loading tickets from SharePoint…');
  try{await loadTickets();renderTable();updateStats();setStatus('ok',`Loaded ${tickets.length} ticket(s)`);setTimeout(()=>setStatus('',''),3000);}
  catch(e){setStatus('err','Error: '+e.message);}
}

function updateStats(){
  document.getElementById('stat-open').textContent=tickets.filter(t=>t.status==='Open').length;
  document.getElementById('stat-progress').textContent=tickets.filter(t=>t.status==='In Progress').length;
  document.getElementById('stat-closed').textContent=tickets.filter(t=>t.status==='Closed').length;
  document.getElementById('stat-critical').textContent=tickets.filter(t=>t.priority==='Critical').length;
  document.getElementById('stat-total').textContent=tickets.length;
}

function renderTable(){
  const search=document.getElementById('search').value.toLowerCase();
  const fS=document.getElementById('filter-status').value;
  const fP=document.getElementById('filter-priority').value;
  const filtered=tickets.filter(t=>{
    if(fS&&t.status!==fS)return false;
    if(fP&&t.priority!==fP)return false;
    if(search){const h=[t.id,t.subject,t.requester,t.name,t.category,t.assignedTo].join(' ').toLowerCase();if(!h.includes(search))return false;}
    return true;
  });
  const tbody=document.getElementById('ticket-table');
  const empty=document.getElementById('empty-state');
  if(!filtered.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=filtered.map(t=>`
    <tr onclick="openModal('${t.id}')">
      <td><span style="font-family:var(--mono);font-size:12px">${t.id||'—'}</span></td>
      <td>${t.subject||t.description?.substring(0,60)||'—'}</td>
      <td>${t.requester||t.name||'—'}</td>
      <td>${t.category||'—'}</td>
      <td><span class="badge p-${(t.priority||'').toLowerCase()}">${t.priority||'—'}</span></td>
      <td><span class="badge s-${(t.status||'open').toLowerCase().replace(' ','')}">${t.status||'Open'}</span></td>
      <td>${t.assignedTo||'—'}</td>
      <td style="font-size:12px;color:var(--text3)">${t.createdAt?new Date(t.createdAt).toLocaleDateString():'—'}</td>
    </tr>`).join('');
}

function openModal(id){
  const t=tickets.find(t=>t.id===id);if(!t)return;
  editingId=id;
  document.getElementById('modal-title').textContent=`${t.id} — ${t.subject||'Ticket'}`;
  document.getElementById('m-status').value=t.status||'Open';
  document.getElementById('m-priority').value=t.priority||'Medium';
  document.getElementById('m-assigned').value=t.assignedTo||'';
  document.getElementById('m-subject').value=t.subject||'';
  document.getElementById('m-description').value=t.description||'';
  document.getElementById('m-note').value='';
  document.getElementById('m-activity').innerHTML=(t.activity||[]).map(a=>`<div>${a}</div>`).join('')||'<div style="color:var(--text3)">No activity yet</div>';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}

async function saveTicket(){
  const idx=tickets.findIndex(t=>t.id===editingId);if(idx===-1)return;
  const t=tickets[idx],oldStatus=t.status,note=document.getElementById('m-note').value.trim();
  t.status=document.getElementById('m-status').value;
  t.priority=document.getElementById('m-priority').value;
  t.assignedTo=document.getElementById('m-assigned').value.trim();
  t.updatedAt=new Date().toISOString();
  if(!t.activity)t.activity=[];
  if(t.status!==oldStatus)t.activity.push(`[${new Date().toLocaleString()}] Status → ${t.status}`);
  if(note)t.activity.push(`[${new Date().toLocaleString()}] Note: ${note}`);
  closeModal();
  setStatus('loading','Saving…');
  try{await saveTickets();renderTable();updateStats();setStatus('ok','Ticket saved');setTimeout(()=>setStatus('',''),3000);}
  catch(e){setStatus('err','Save failed: '+e.message);}
}

function setStatus(type,msg){
  const el=document.getElementById('status-bar');
  el.textContent=msg;el.className='status-bar'+(type?' '+type:'');
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
initAuth();
</script>
</body>
</html>
